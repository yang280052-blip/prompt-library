<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示词库 | Prompt Library - Premium Edition</title>
    <meta name="description" content="一个高级的现代化 AI 提示词管理与分享系统">
    
    <!-- 加载高级字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 现代暗黑系色彩系统 */
            --bg-base: #09090b;
            --bg-surface: rgba(24, 24, 27, 0.6);
            --bg-surface-hover: rgba(39, 39, 42, 0.8);
            
            --primary: #8b5cf6;       /* 紫罗兰 */
            --primary-hover: #7c3aed;
            --secondary: #06b6d4;     /* 青色 */
            --accent: #f43f5e;        /* 玫瑰红 */
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --border-light: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(139, 92, 246, 0.3);
            
            --success: #10b981;
            
            /* 阴影效果 */
            --shadow-card: 0 4px 20px -2px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px rgba(139, 92, 246, 0.15);
            
            /* 动画过渡 */
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            /* 平滑滚动 */
            scroll-behavior: smooth;
        }

        /* 动态网格呼吸背景 */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(244, 63, 94, 0.05) 0%, transparent 50%);
            animation: pulseBg 15s ease-in-out infinite alternate;
        }

        /* 背景网格底纹 */
        .animated-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* 通用毛玻璃面板 */
        .glass-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            position: relative;
        }

        /* 头部设计 */
        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: slideDown 0.8s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            /* 渐变流光文字 */
            background: linear-gradient(135deg, #fff 20%, var(--primary) 60%, var(--secondary) 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 5s linear infinite;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 高级搜索框 */
        .search-container {
            max-width: 700px;
            margin: 0 auto 3rem;
            position: relative;
            animation: fadeIn 1s ease-out 0.3s forwards;
            opacity: 0;
            z-index: 10;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 999px;
            padding: 0.5rem 1rem;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2), var(--shadow-glow);
            transform: translateY(-2px);
        }

        .search-icon {
            color: var(--text-muted);
            margin-left: 1rem;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .search-box:focus-within .search-icon {
            color: var(--primary);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem;
            color: var(--text-main);
            font-size: 1.1rem;
            font-family: inherit;
        }

        .search-box input:focus {
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            margin-right: 0.5rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .clear-btn.visible {
            opacity: 1;
            visibility: visible;
        }

        .clear-btn:hover {
            color: var(--accent);
            transform: scale(1.1);
        }

        /* 分类导航 */
        .categories-wrapper {
            margin-bottom: 4rem;
            animation: fadeIn 1s ease-out 0.6s forwards;
            opacity: 0;
            /* 隐藏滚动条但允许滚动 */
            -ms-overflow-style: none;
            scrollbar-width: none;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .categories-wrapper::-webkit-scrollbar {
            display: none;
        }

        .categories {
            display: inline-flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            min-width: max-content;
            margin: 0 auto;
            width: 100%;
        }

        .category-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(39, 39, 42, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-light);
            border-radius: 999px;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-btn:hover {
            background: rgba(63, 63, 70, 0.6);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        /* 提示词卡片网格 */
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 2rem;
            list-style: none;
        }

        /* 卡片入场动画 */
        .prompt-card {
            opacity: 0;
            transform: translateY(20px);
            animation: cardFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: var(--transition-smooth);
        }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 卡片主体设计 */
        .card-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* 卡片悬浮特效 */
        .prompt-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px; /* 边框厚度 */
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .prompt-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            background: var(--bg-surface-hover);
        }

        .prompt-card:hover::before {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        /* 卡片内部元素 */
        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .prompt-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.3;
        }

        .prompt-tag {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.35rem 0.85rem;
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            border-radius: 999px;
            white-space: nowrap;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .prompt-desc {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        /* 代码块区域 */
        .code-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            background: #000;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 2px;
        }

        .code-header {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px 10px 0 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'Inter', sans-serif;
        }

        .code-header::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
            margin-right: 0.75rem;
            box-shadow: 0 0 10px var(--secondary);
        }

        .prompt-content {
            padding: 1.25rem;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #e2e8f0;
            max-height: 220px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        /* 优雅的滚动条 */
        .prompt-content::-webkit-scrollbar {
            width: 8px;
        }
        .prompt-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .prompt-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .prompt-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 复制按钮 */
        .copy-btn {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .copy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .copy-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }

        .copy-btn:hover::before {
            left: 100%;
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-btn.copied {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        /* 全局 Toast 提示 */
        .toast-container {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }

        .toast {
            background: var(--success);
            color: white;
            padding: 1rem 2rem;
            border-radius: 999px;
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* 统计数据 */
        .stats {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-size: 0.95rem;
            animation: fadeIn 1s ease-out 1s forwards;
            opacity: 0;
        }

        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 6rem 2rem;
            background: rgba(24, 24, 27, 0.4);
            border-radius: 20px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 动画基础类 */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .prompts-grid {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 2rem 1rem; }
            .prompts-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .search-box { padding: 0.25rem 0.5rem; }
            .categories { justify-content: flex-start; padding: 0 1rem; }
            .card-inner { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="animated-bg"></div>
    
    <main class="container">
        <!-- 头部区域 -->
        <header>
            <h1>Prompt Library</h1>
            <p class="subtitle">您的专属 AI 指令词库 · 优雅收集 · 一键触发</p>
        </header>

        <!-- 搜索区域 -->
        <section class="search-container">
            <div class="search-box">
                <span class="search-icon">✨</span>
                <input type="text" id="searchInput" placeholder="搜索提示词名称、描述或内容..." autocomplete="off">
                <button class="clear-btn" id="clearBtn" title="清除内容">✕</button>
            </div>
        </section>

        <!-- 分类区域 -->
        <nav class="categories-wrapper">
            <div class="categories" id="categories">
                <button class="category-btn active" data-category="all">
                    <span>🌐</span> 全部
                </button>
                <!-- JS动态生成 -->
            </div>
        </nav>

        <!-- 内容区域 -->
        <section>
            <ul class="prompts-grid" id="promptsGrid">
                <!-- JS动态渲染卡片 -->
            </ul>
        </section>

        <!-- 底部统计 -->
        <footer class="stats" id="stats">
            正在加载神奇的代码...
        </footer>
    </main>

    <!-- 复制成功的提示框 -->
    <div class="toast-container">
        <div class="toast" id="toast">
            <span>🎉</span> 复制成功，快去向 AI 提问吧！
        </div>
    </div>

    <!-- 核心逻辑 -->
    <script>
        let prompts = [];
        let currentCategory = 'all';
        let searchQuery = '';
        let allCategories = [];

        // 给特定分类分配图标增加视觉效果
        const categoryIcons = {
            '编程': '💻', '设计': '🎨', '写作': '✍️', '翻译': '🌍',
            '工作': '💼', '生活': '☕', '学习': '📚', '娱乐': '🎮',
            'AI': '🤖', '系统': '⚙️', '默认': '🔖'
        };

        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const grid = document.getElementById('promptsGrid');

        // 加载数据
        async function loadPrompts() {
            try {
                // 在本地环境若因跨域无法加载，可以回退为示例数据，这里保持 fetch
                const response = await fetch('prompts.json');
                prompts = await response.json();
                
                extractCategories();
                renderCategories();
                renderPrompts();
            } catch (error) {
                console.error('加载提示词失败:', error);
                showErrorState();
            }
        }

        function extractCategories() {
            const categorySet = new Set();
            prompts.forEach(p => {
                if (p.category) categorySet.add(p.category);
                if (p.category2) categorySet.add(p.category2);
            });
            allCategories = Array.from(categorySet);
        }

        // 渲染分类
        function renderCategories() {
            const container = document.getElementById('categories');
            const allBtn = container.querySelector('[data-category="all"]');
            container.innerHTML = '';
            container.appendChild(allBtn);
            
            allCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.dataset.category = cat;
                
                // 尝试匹配图标
                const icon = categoryIcons[cat] || '🔖';
                btn.innerHTML = `<span>${icon}</span> ${cat}`;
                
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = cat;
                    renderPrompts();
                });
                container.appendChild(btn);
            });
        }

        // 核心渲染逻辑
        function renderPrompts() {
            // 先清空并重置动画
            grid.innerHTML = '';

            const filtered = prompts.filter(p => {
                const matchCategory = currentCategory === 'all' || 
                    p.category === currentCategory || p.category2 === currentCategory;
                const matchSearch = searchQuery === '' || 
                    (p.title && p.title.toLowerCase().includes(searchQuery.toLowerCase())) ||
                    (p.desc && p.desc.toLowerCase().includes(searchQuery.toLowerCase())) ||
                    (p.content && p.content.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchCategory && matchSearch;
            });

            if (filtered.length === 0) {
                showEmptyState();
            } else {
                // 延迟渲染以实现交错动画
                filtered.forEach((p, index) => {
                    const li = document.createElement('li');
                    li.className = 'prompt-card glass-panel';
                    // 增加交错动画延迟
                    li.style.animationDelay = `${index * 0.05}s`;
                    
                    li.innerHTML = `
                        <div class="card-inner">
                            <header class="prompt-header">
                                <h3 class="prompt-title">${p.title || '未命名'}</h3>
                                <span class="prompt-tag">${p.category || '未分类'}</span>
                            </header>
                            
                            <p class="prompt-desc">${p.desc || '暂无描述'}</p>
                            
                            <div class="code-wrapper">
                                <div class="code-header">${p.label || 'PROMPT'}</div>
                                <div class="prompt-content">${p.content || ''}</div>
                            </div>
                            
                            <button class="copy-btn" onclick="copyAction(${p.id}, this)">
                                <span>📋</span> 一键复制
                            </button>
                        </div>
                    `;
                    grid.appendChild(li);
                });
            }

            // 更新统计文字
            document.getElementById('stats').innerHTML = 
                `检索到 <strong style="color:var(--primary)">${filtered.length}</strong> 条优质魔法指令`;
        }

        function showEmptyState() {
            grid.innerHTML = `
                <div class="empty-state">
                    <span class="empty-icon">🛸</span>
                    <h3 style="font-size:1.5rem; margin-bottom:0.5rem; font-weight:600">虚空之中，一无所获</h3>
                    <p style="color:var(--text-muted)">尝试更换搜索关键词或选择"全部"分类</p>
                </div>
            `;
        }
        
        function showErrorState() {
            grid.innerHTML = `
                <div class="empty-state">
                    <span class="empty-icon">⚠️</span>
                    <h3 style="font-size:1.5rem; margin-bottom:0.5rem; font-weight:600">本地跨域限制</h3>
                    <p style="color:var(--text-muted)">如果您是直接双击打开的HTML，浏览器限制了读取 prompts.json。<br><br>请将文件放入本地服务器环境（如 VScode 的 Live Server，或运行 python -m http.server）以正常加载数据。</p>
                </div>
            `;
        }

        // 复制交互机制
        function copyAction(id, btn) {
            const prompt = prompts.find(p => p.id === id);
            if (!prompt) return;

            navigator.clipboard.writeText(prompt.content).then(() => {
                // 按钮状态改变
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<span>✨</span> 复制成功！';
                btn.classList.add('copied');
                
                // 弹出 Toast
                const toast = document.getElementById('toast');
                // 触发重绘以重启 CSS 动画
                toast.classList.remove('show');
                void toast.offsetWidth; 
                toast.classList.add('show');
                
                // 恢复原状
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('copied');
                    toast.classList.remove('show');
                }, 2500);
            });
        }

        // 搜索事件绑定
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            
            // 显示或隐藏清除按钮
            if (searchQuery.length > 0) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
            
            renderPrompts();
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            searchQuery = '';
            clearBtn.classList.remove('visible');
            searchInput.focus();
            renderPrompts();
        });

        // "全部"按钮点击特殊处理
        document.querySelector('.category-btn[data-category="all"]').addEventListener('click', function() {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = 'all';
            renderPrompts();
        });

        // 启动应用
        loadPrompts();
    </script>
</body>
</html>
